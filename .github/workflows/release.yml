name: Build unregistry for Debian

on:
  workflow_dispatch:
    inputs:
      unregistry_version:
        description: The version of unregistry to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true

permissions:
  contents: write

jobs:
  build-unregistry:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout unregistry-debian
        uses: actions/checkout@v4

      - name: Validate upstream license permits paid distribution
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./validate_license.sh ${{ inputs.unregistry_version }}

      - name: Build unregistry
        run: ./build.sh ${{ inputs.unregistry_version }} ${{ inputs.build_version }}

      - name: Upload unregistry Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: |
            unregistry_*.deb
            docker-pussh_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout unregistry-debian
        uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.unregistry_version }} ${{ inputs.build_version }}

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            unregistry_*.dsc
            unregistry_*.orig.tar.gz
            unregistry_*.debian.tar.xz

  release-unregistry:
    name: Release unregistry for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-unregistry, build-src]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            unregistry_*.deb
            docker-pussh_*.deb
            unregistry_*.dsc
            unregistry_*.orig.tar.gz
            unregistry_*.debian.tar.xz
          name: ${{ inputs.unregistry_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.unregistry_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
